version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bowman_insurance
      POSTGRES_USER: ${DB_USER:-bowman}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bowman} -d bowman_insurance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: bowman_insurance.settings.production
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DB_NAME: bowman_insurance
      DB_USER: ${DB_USER:-bowman}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      DATABASE_URL: postgresql://${DB_USER:-bowman}:${DB_PASSWORD}@db:5432/bowman_insurance
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Optional — leave blank to skip
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-af-south-1}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-}
      MPESA_CALLBACK_SECRET: ${MPESA_CALLBACK_SECRET:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@bowmaninsurance.co.ke}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A bowman_insurance worker -l info --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: bowman_insurance.settings.production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER:-bowman}:${DB_PASSWORD}@db:5432/bowman_insurance
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    # No depends_on backend — frontend is a static Next.js build; API errors are handled at runtime

volumes:
  postgres_data:
  redis_data:
